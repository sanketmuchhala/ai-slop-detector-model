seed: 42
run_name: "lora-bert"

model:
  name: "bert-base-cased"
  num_labels: 2
  use_lora: true
  lora:
    r: 16
    lora_alpha: 16
    lora_dropout: 0.05
    target_modules: "all-linear"
    bias: "none"
    use_rslora: true
    modules_to_save: ["classifier"]

data:
  dataset: "wiki_human_ai"
  train_on_raid: false
  raid_include_adversarial: false
  max_length: 512
  val_size: 0.1
  test_size: 0.1

training:
  learning_rate: 5e-5
  num_epochs: 5
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 8
  weight_decay: 0.1
  warmup_ratio: 0.1
  fp16: true
  save_strategy: "steps"
  save_steps: 64
  eval_strategy: "steps"
  eval_steps: 64
  metric_for_best_model: "eval_auc"
  greater_is_better: true
  load_best_model_at_end: true
  save_total_limit: 2
  logging_steps: 16
  dataloader_num_workers: 4

eval:
  raid_split: "train"
  raid_include_adversarial: true
  fpr_targets: [0.001, 0.005, 0.01, 0.02, 0.05]
  tpr_targets: [0.80, 0.90, 0.95]
  threshold_sweep_steps: 1000

calibration:
  conservative_max_fpr: 0.01
  balanced_target_tpr: 0.90

export:
  onnx: true
  onnx_opset: 14
  model_version: "v0.1.0"

output:
  runs_dir: "runs"
